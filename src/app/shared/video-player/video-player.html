<div class="player-wrapper">
  <div class="player-host">
    <div #host></div>
  </div>
  @if (!canControl()) {
    <div class="player-shield" aria-hidden="true"></div>
  }
  @if (!videoId()) {
    <div class="player-placeholder">
      <p>No video playing yet</p>
    </div>
  } @else if (playerError()) {
    <div class="player-placeholder player-placeholder--error" role="alert">
      <p>{{ playerError() }}</p>
    </div>
  }
</div>
