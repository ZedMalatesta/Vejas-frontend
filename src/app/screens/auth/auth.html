<h1>Auth</h1>

<input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
/>

<input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
/>

<button (click)="login()">
    Login
</button>

<button (click)="register()">
    Register
</button>

<hr />

<button (click)="loginGoogle()">
    Google
</button>

<button (click)="loginGithub()">
    GitHub
</button>
