<h1>Reset password</h1>

@if (!success()) {

  <input
    (input)="email.set($any($event.target).value)"
    [value]="email()"
    placeholder="Email"
    type="email"
  />

  <button
    (click)="resetPassword()"
    type="button"
  >
    Send reset link
  </button>

  @if (errorMessage) {
    <p>{{ errorMessage }}</p>
  }

} @else {

  <p>
    ✓ Check your email for a password reset link.
  </p>

}
